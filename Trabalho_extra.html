<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho Extra</title>
</head>
<style>
    body{
        background-color: rgb(190, 223, 252);
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        font-size: 15px;
    }
    div{
        background-color: whitesmoke;
        width: 400px;
        height: 600px;
        padding: 10px;
        border: 3px;
        margin: auto;
    }
    header{
        background-color: rgb(217, 234, 250);
        width: 390px;
        height: 70px;
        padding: 5px;
        align-items: center;
        margin-bottom: 10px;
        }
    .Titulo{
        font-size: 18px;
        font-weight: bold;
    }
     .B_Reset{
        background-color: lightskyblue;
        width: 100px;
        height: 35px;
        padding: 5px;
        border-radius: 10px;
        margin-right: 10px;
    }
    .B_Submit{
        background-color: rgb(171, 233, 171);
        width: 100px;
        height: 35px;
        padding: 5px;
        border-radius: 10px;
    }
   
</style>
<body>
    <div class = "Container">
        <header>
        <p class="Titulo">Formulário de Cadastro</p>
        </header>
        <form>
            <label for="nome">Nome Completo:</label>
            <input type="text" name="nome" id="nome" placeholder="Seu nome aqui" required minlength="2">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="seuemail@gmail.com" required>
            <br><br>

            <label for="assunto">Assunto:</label>
            <select name="ass" id="ass" required>
                <option value="" disabled selected>Escreva o assunto da mensagem aqui</option>
                <option value="Relatar Problema">Relatar Problemas com a Rede</option>
            </select>
            <br><br>

            <label for="mensagem">Mensagem:</label>
            <textarea name="msg" id="msg" maxlength="500" placeholder="Escreva sua mensagem aqui..." required></textarea>
            <br><br>

            <label for="newsletter">Receber Newsletter</label>
            <input type="checkbox" name="newsletter" id="newsletter" value="sim">
            <br><br>

            <button class="B_Submit" type="submit">Enviar</button>
            <button class="B_Reset" type="reset">Limpar</button>
        </form>
    </div>
</body>
</html>
