<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho Extra</title>
</head>
<style>/*Utilizamos ele para editar os estilos da página dentro do código html*/

    /*Estilo para o corpo da página*/
    body{
        background-color: rgb(190, 223, 252);
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        font-size: 15px;
    }

    /*Estilo para o retângulo que criei para deixar o formulário destacado*/
    div{
        background-color: whitesmoke;
        width: 400px;
        height: 400px;
        padding: 12px;
        border: 3px;
        border-radius: 10px;
        margin: auto; /*Centraliza o meu retângulo*/
        box-shadow: 5px 5px 10px 2px rgba(0, 0, 0, 0.1);
    }

    /*Estilo para o meu cabeçalho*/
    header{
        background-color: rgb(217, 234, 250);
        width: 390px;
        height: 70px;
        padding: 5px;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        align-items: center;
        margin-bottom: 20px;
        }

    /*Criei essa classe para poder editar o Título do formulário livremente*/
    .Titulo{
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        margin-top: 25px;
    }

    /*Estilo do botão de reset*/
    .B_Reset{
        background-color: lightskyblue;
        width: 100px;
        height: 35px;
        padding: 5px;
        border-radius: 10px;
        margin-right: 10px; /*Distância entre os dois botões*/
        cursor: pointer;
        border: none;
    }
    .B_Reset:hover{
        font-weight: bolder;
        background-color: rgb(123, 186, 226);
        box-shadow: 5px 5px 10px 2px rgba(0, 0, 0, 0.15);
        
    }

    /*Estilo do botão de Enviar*/
    .B_Submit{
        background-color: rgb(171, 233, 171);
        width: 100px;
        height: 35px;
        padding: 5px;
        border-radius: 10px;
        cursor: pointer;
        border: none;
    }
    .B_Submit:hover{
        font-weight: bolder;
        background-color: rgb(145, 231, 145);
        box-shadow: 5px 5px 10px 2px rgba(0, 0, 0, 0.15);
    }
   
</style>
<body>
    <div class = "Container"> <!--Criei o container, tentando simular o Google Forms, um dia eu chego lá-->
        <header>
        <p class="Titulo">Formulário de Cadastro</p><!--Decidi usar um parágrafo dentro de uma classe para facilitar a sua edição-->
        </header>
        <form><!--Comando para criar um formulário-->
            <label for="nome">Nome Completo:</label><!--A pedido do professor utilizei o comando "label"-->
            <input type="text" name="nome" id="nome" placeholder="Seu nome aqui" required minlength="2"> <!--Definine que nome é uma entrada do tipo texto, o qual não pode ser deixado em branco, e tem o minimo de preenchimento como 2 caracteres-->
            <br><br>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="seuemail@gmail.com" required><!--Aqui eu criei um elemento do tipo email, que também não pode ser deixado em branco-->
            <br><br><!--Quebra de linha-->

            <label for="assunto">Assunto:</label>
            <select name="ass" id="ass" required><!--O Assunto eu criei como um campo de selecionar, ele não pode ser deixado em branco-->
                <option value="" disabled selected>Escreva o assunto da mensagem aqui</option>
                <option value="Relatar Problema">Relatar Problemas com a Rede</option>
            </select>
            <br><br>

            <label for="mensagem">Mensagem:</label>
            <textarea name="msg" id="msg" maxlength="500" placeholder="Escreva sua mensagem aqui..." required></textarea><!--A mensagem é um campo do tipo textarea, eu não sabia que tinha de fechar o comando, pra mim era igual o input, mas não é-->
            <br><br>

            <label for="newsletter">Receber Newsletter</label>
            <input type="checkbox" name="newsletter" id="newsletter" value="sim"><!--Entrada do tipo checkbox, pode ser deixada em branco-->
            <br><br>

            <button class="B_Reset" type="reset">Limpar</button> <!--Botão de Limpar, do tipo reset-->
            <button class="B_Submit" type="submit">Enviar</button><!--Botão de Enviar (Pra onde? Não sei ainda), do tipo submit-->
        </form>
    </div>
</body>
</html>
